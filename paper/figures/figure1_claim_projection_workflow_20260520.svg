<text x="355" y="342" font-family="Avenir Next, Gill Sans, sans-serif" font-size="17" font-weight="500" fill="#66706c"><tspan x="355" dy="0">Source, scenario,</tspan><tspan x="355" dy="23">layer, G/Q/U</tspan></text>

