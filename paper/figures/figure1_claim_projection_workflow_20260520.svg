<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="720" viewBox="0 0 1680 720">
<rect width="1680" height="720" fill="#f8faf8"/>
<text x="70" y="86" font-family="Avenir Next, Gill Sans, sans-serif" font-size="38" font-weight="800" fill="#1b2226"><tspan x="70" dy="0">Figure 1. From Metric Evidence To Licensed Emitted</tspan><tspan x="70" dy="45">Claim</tspan></text>
<text x="72" y="132" font-family="Avenir Next, Gill Sans, sans-serif" font-size="18" font-weight="500" fill="#66706c"><tspan x="72" dy="0">Finite generated claims, policy-relative licensing, and action certificates. Not an arbitrary prose parser.</tspan></text>
