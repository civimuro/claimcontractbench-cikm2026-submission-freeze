<text x="881" y="288" font-family="Avenir Next, Gill Sans, sans-serif" font-size="22" font-weight="800" fill="#1b2226"><tspan x="881" dy="0">License</tspan><tspan x="881" dy="28">predicate</tspan></text>
<text x="881" y="342" font-family="Avenir Next, Gill Sans, sans-serif" font-size="17" font-weight="500" fill="#66706c"><tspan x="881" dy="0">F/G/Q/U plus action</tspan><tspan x="881" dy="23">certificates</tspan></text>

