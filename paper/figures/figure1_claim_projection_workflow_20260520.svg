<text x="618" y="342" font-family="Avenir Next, Gill Sans, sans-serif" font-size="17" font-weight="500" fill="#66706c"><tspan x="618" dy="0">Finite candidate</tspan><tspan x="618" dy="23">claims Gamma_T+</tspan></text>

