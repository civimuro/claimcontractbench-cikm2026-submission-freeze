<text x="1407" y="342" font-family="Avenir Next, Gill Sans, sans-serif" font-size="17" font-weight="500" fill="#66706c"><tspan x="1407" dy="0">Bounded sentence with</tspan><tspan x="1407" dy="23">certificate</tspan></text>
<rect x="70" y="545" width="1540" height="92" fill="#edf5f1" stroke="#145c5a" stroke-width="2"/>
<text x="96" y="582" font-family="Avenir Next, Gill Sans, sans-serif" font-size="19" font-weight="800" fill="#145c5a"><tspan x="96" dy="0">Caption guard</tspan></text>
<text x="280" y="582" font-family="Avenir Next, Gill Sans, sans-serif" font-size="18" font-weight="500" fill="#1b2226"><tspan x="280" dy="0">The operator projects finite typed candidates under declared context. The figure does not claim universal natural-language</tspan><tspan x="280" dy="24">verification, SOTA, or deployment safety.</tspan></text>
