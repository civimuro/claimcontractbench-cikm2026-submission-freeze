<text x="1144" y="342" font-family="Avenir Next, Gill Sans, sans-serif" font-size="17" font-weight="500" fill="#66706c"><tspan x="1144" dy="0">Maximal licensed</tspan><tspan x="1144" dy="23">claim or bottom_T</tspan></text>

