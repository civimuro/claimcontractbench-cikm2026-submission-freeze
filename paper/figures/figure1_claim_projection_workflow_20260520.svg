<text x="92" y="342" font-family="Avenir Next, Gill Sans, sans-serif" font-size="17" font-weight="500" fill="#66706c"><tspan x="92" dy="0">Scores, ECE/F1, local</tspan><tspan x="92" dy="23">support, source row</tspan></text>

